<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLibrary</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main id="app-container" data-auth-state="unauthenticated">
        <div id="unauthenticated-view" class="card">
            <h2>Sign In</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="passphrase">Passphrase</label>
                    <input type="password" id="passphrase" name="passphrase" required autocomplete="current-password">
                </div>
                <button type="submit" id="login-btn">Sign In</button>
                <div id="login-error"></div>
            </form>
        </div>

        <div id="authenticated-view" class="card">
            <h2 id="welcome-msg">Welcome</h2>
            <button id="steam-connect-btn">Connect Steam</button>
            <div id="steam-error" style="color: red"></div>
            <section id="steam-library" style="display:none">
                <p id="steam-game-count">Steam: 0 games</p>
                <div id="steam-games-grid"></div>
                <button id="steam-disconnect-btn">Disconnect Steam</button>
            </section>
            <section id="epic-connect-section">
                <p>Connect your Epic Games library</p>
                <a id="epic-open-btn" href="#" target="_blank" rel="noopener noreferrer">Open Epic page</a>
                <div class="form-group">
                    <label for="epic-code-input">Paste authorization code:</label>
                    <input type="text" id="epic-code-input" placeholder="authorizationCode value from Epic page">
                </div>
                <button id="epic-connect-btn">Connect Epic</button>
                <div id="epic-error" style="color: red"></div>
            </section>
            <section id="epic-library" style="display:none">
                <p id="epic-game-count">Epic: 0 games</p>
                <div id="epic-games-grid"></div>
                <button id="epic-disconnect-btn">Disconnect Epic</button>
            </section>
            <button id="logout-btn">Sign Out</button>
        </div>
    </main>

    <script type="module">
        import { authManager } from './js/auth.js';
        import { steamManager } from './js/steam.js';
        import { epicManager } from './js/epic.js';

        const appContainer = document.getElementById('app-container');
        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const logoutBtn = document.getElementById('logout-btn');
        const welcomeMsg = document.getElementById('welcome-msg');
        const usernameInput = document.getElementById('username');
        const passphraseInput = document.getElementById('passphrase');
        const steamConnectBtn = document.getElementById('steam-connect-btn');
        const steamLibrary = document.getElementById('steam-library');
        const steamGamesGrid = document.getElementById('steam-games-grid');
        const steamGameCount = document.getElementById('steam-game-count');
        const epicOpenBtn = document.getElementById('epic-open-btn');
        const epicConnectBtn = document.getElementById('epic-connect-btn');
        const epicCodeInput = document.getElementById('epic-code-input');
        const epicConnectSection = document.getElementById('epic-connect-section');
        const epicLibrary = document.getElementById('epic-library');
        const epicGamesGrid = document.getElementById('epic-games-grid');
        const epicGameCount = document.getElementById('epic-game-count');
        const epicError = document.getElementById('epic-error');

        const pageParams = new URLSearchParams(window.location.search);
        const pendingSteamCallback = pageParams.get('steam_connected') === '1';
        const pendingSteamError = pageParams.get('steam_error') ?? null;

        epicOpenBtn.href = epicManager.getRedirectUrl();

        function renderSteamGames(games) {
            steamGamesGrid.innerHTML = '';
            (games || []).forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                const nameSpan = document.createElement('span');
                nameSpan.className = 'game-name';
                nameSpan.textContent = game.name;
                card.appendChild(nameSpan);
                steamGamesGrid.appendChild(card);
            });
            const n = (games || []).length;
            steamGameCount.textContent = `Steam: ${n} ${n === 1 ? 'game' : 'games'}`;
        }

        function renderEpicGames(games) {
            epicGamesGrid.innerHTML = '';
            (games || []).forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                const nameSpan = document.createElement('span');
                nameSpan.className = 'game-name';
                nameSpan.textContent = game.name;
                card.appendChild(nameSpan);
                epicGamesGrid.appendChild(card);
            });
            const n = (games || []).length;
            epicGameCount.textContent = `Epic: ${n} games`;
        }

        document.addEventListener('auth:login', async (event) => {
            const { username, state } = event.detail;
            appContainer.dataset.authState = 'authenticated';
            welcomeMsg.textContent = `Welcome, ${username}`;

            if (pendingSteamError) {
                const errDiv = document.getElementById('steam-error');
                if (errDiv) errDiv.textContent = pendingSteamError;
                window.history.replaceState({}, document.title, '/');
            }

            if (pendingSteamCallback) {
                await steamManager.handleCallback(authManager);
            } else if (state.steam) {
                renderSteamGames(state.steam.games);
                steamConnectBtn.style.display = 'none';
                steamLibrary.style.display = '';
            }

            if (state.epic) {
                renderEpicGames(state.epic.games);
                epicConnectSection.style.display = 'none';
                epicLibrary.style.display = '';
            }
        });

        document.addEventListener('auth:logout', () => {
            appContainer.dataset.authState = 'unauthenticated';
            loginForm.reset();
            loginError.textContent = '';
            steamConnectBtn.style.display = '';
            steamLibrary.style.display = 'none';
            epicLibrary.style.display = 'none';
            epicConnectSection.style.display = '';
            epicError.textContent = '';
        });

        document.addEventListener('steam:connected', (event) => {
            const { games } = event.detail;
            renderSteamGames(games);
            steamConnectBtn.style.display = 'none';
            steamLibrary.style.display = '';
        });

        document.addEventListener('steam:disconnected', () => {
            steamConnectBtn.style.display = '';
            steamLibrary.style.display = 'none';
        });

        document.addEventListener('steam:error', (event) => {
            const msg = event.detail?.message || 'Steam connection failed';
            const errDiv = document.getElementById('steam-error');
            if (errDiv) errDiv.textContent = msg;
        });

        document.addEventListener('epic:connected', (event) => {
            const { games } = event.detail;
            renderEpicGames(games);
            epicConnectSection.style.display = 'none';
            epicLibrary.style.display = '';
        });

        document.addEventListener('epic:disconnected', () => {
            epicLibrary.style.display = 'none';
            epicConnectSection.style.display = '';
        });

        document.addEventListener('epic:error', (event) => {
            const msg = event.detail?.message || 'Epic connection failed';
            epicError.textContent = msg;
        });

        steamConnectBtn.addEventListener('click', () => steamManager.connectSteam());
        document.getElementById('steam-disconnect-btn').addEventListener('click', () => {
            steamManager.disconnectSteam(authManager);
        });

        epicConnectBtn.addEventListener('click', () => epicManager.connectEpic(epicCodeInput.value.trim(), authManager));
        document.getElementById('epic-disconnect-btn').addEventListener('click', () => {
            epicManager.disconnectEpic(authManager);
        });

        const SESSION_KEY = 'ml_session';

        function saveSession(username, passphrase) {
            sessionStorage.setItem(SESSION_KEY, JSON.stringify({ username, passphrase }));
        }

        function clearSession() {
            sessionStorage.removeItem(SESSION_KEY);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = usernameInput.value;
            const passphrase = passphraseInput.value;

            if (!username || !passphrase) return;

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in…';
            loginError.textContent = '';

            try {
                await authManager.login(username, passphrase);
                saveSession(username, passphrase);
            } catch (err) {
                loginError.textContent = err.message || 'Login failed';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });

        logoutBtn.addEventListener('click', () => {
            clearSession();
            authManager.logout();
            loginBtn.disabled = false;
            loginBtn.textContent = 'Sign In';
        });

        const storedSession = sessionStorage.getItem(SESSION_KEY);
        if (storedSession) {
            try {
                const { username, passphrase } = JSON.parse(storedSession);
                await authManager.login(username, passphrase);
            } catch (_e) {
                clearSession();
            }
        }
    </script>
</body>
</html>
